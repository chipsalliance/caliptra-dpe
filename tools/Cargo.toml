[package]
name = "caliptra-dpe-tools"
version = "0.1.0"
edition = "2021"

[features]
default = ["p384"]
# Run ARBITRARY_MAX_HANDLES=n cargo build --features arbitrary_max_handles to use this feature
arbitrary_max_handles = ["caliptra-dpe/arbitrary_max_handles"]
p256 = ["caliptra-dpe/p256"]
p384 = ["caliptra-dpe/p384"]
# TODO(clundin): Placeholder name until we decide pattern for DPE profiles and feature flags.
ml-dsa = [
  "caliptra-dpe/ml-dsa"
]
hybrid = ["p384", "ml-dsa"]
cfi = ["caliptra-dpe/cfi"]

[dependencies]
anyhow = "1.0.70"
caliptra-dpe = {path = "../dpe", default-features = false}
clap = { version = "4.1.8", features = ["derive"] }
caliptra-dpe-crypto = {path = "../crypto", default-features = false, features = ["deterministic_rand", "rustcrypto"]}
pem = "2"
caliptra-dpe-platform = {path = "../platform", default-features = false, features = ["rustcrypto"]}
zerocopy.workspace = true

[[bin]]
name = "sample_dpe_cert"
path = "src/sample_dpe_cert.rs"

[[bin]]
name = "cert-size"
path = "src/cert_size.rs"
