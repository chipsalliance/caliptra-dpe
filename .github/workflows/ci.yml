name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ubuntu:
    runs-on: ubuntu-latest

    env:
      CARGO_INCREMENTAL: 0

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Test commit name
        run: |
          echo "Build-Test: release_ref=$(git rev-parse HEAD)"

      - name: Install Nix
        run: |
          sudo apt-get update
          sudo apt-get install -y nix-bin
          # For a manual install in CI, we take ownership of /nix and use local mode
          # to avoid daemon socket permission issues.
          sudo mkdir -p /nix
          sudo chown -R $(whoami) /nix
          # Enable flakes and nix-command
          mkdir -p ~/.config/nix
          echo "experimental-features = nix-command flakes" > ~/.config/nix/nix.conf

      - name: Run CI tests
        run: |
          export NIX_REMOTE=local
          nix develop --command cargo xtask ci
