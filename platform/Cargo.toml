arbitrary_issuer_name_size = []

[dependencies]
arrayvec.workspace = true
caliptra-dpe-crypto = { workspace = true, default-features = false }
cfg-if.workspace = true
ufmt.workspace = true
x509-cert = { workspace = true, optional = true }

[dev-dependencies]
