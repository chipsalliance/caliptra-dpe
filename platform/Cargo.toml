[package]
authors.workspace = true
edition.workspace = true
license.workspace = true
name = "caliptra-dpe-platform"
publish.workspace = true
version.workspace = true

[features]
default = []
rustcrypto = ["caliptra-dpe-crypto/test-artifacts", "dep:x509-cert"]
